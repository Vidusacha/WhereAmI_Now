version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: whereami_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    # If moving to a machine with a GPU later, you can uncomment this:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  ollama-data:
