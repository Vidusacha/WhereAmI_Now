apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: whereami
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: whereami_db
            - name: POSTGRES_USER
              value: admin
            - name: POSTGRES_PASSWORD
              value: "securepassword123" # Move to secrets in prod
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
