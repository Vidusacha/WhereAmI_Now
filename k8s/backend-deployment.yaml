apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: whereami
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: whereami-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql://admin:securepassword123@postgres:5432/whereami_db"
            # Mount Playwright storage to a PVC if offline storage is needed
